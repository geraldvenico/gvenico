name: Generate Ocean Wave

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Ocean Wave
        uses: Anurag-Deo/github-contribution-grid-snake-dark@main
        with:
          github_user_name: geraldvenico
          svg_out_path: dist/ocean.svg
          
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
